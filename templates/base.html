<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}CommunityHero Nexus{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}">
    <!-- Leaflet CSS -->
    <link rel="stylesheet"href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">

        <div class="container-fluid px-5">

            <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            
                <i class="bi bi-shield-check me-2 text-info"></i>
            
                CommunityHero Nexus
            
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto align-items-center">
                
                    <li class="nav-item mx-2">
                        <a class="nav-link" href="/">
                            🏠 Home
                        </a>
                    </li>
                
                    <li class="nav-item mx-2">
                        <a class="nav-link" href="/report">
                            📝 Report
                        </a>
                    </li>
                
                    <li class="nav-item mx-2">
                        <a class="nav-link" href="/tracking">
                            🔎 Tracking
                        </a>
                    </li>
                
                    <li class="nav-item mx-2">
                        <a class="nav-link" href="/authority">
                            🏛 Authority
                        </a>
                    </li>
                
                    <li class="nav-item mx-2">
                        <a class="nav-link" href="/dashboard">
                            🧠 AI Command Center
                        </a>
                    </li>
                
                    <li class="nav-item mx-2">
                        <a class="nav-link" href="/assistant">
                            🤖 AI Assistant
                        </a>
                    </li>
                
                </ul>

            </div>

        </div>

    </nav>

    <!-- Page Content -->
    {% block content %}
    {% endblock %}
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_js %}{% endblock %}

<footer class="text-center py-4 mt-5">
    <hr>
    <p>
        CommunityHero Nexus © 2026
    </p>
    <small>
        AI Powered Civic Intelligence Platform
    </small>
</footer>
<script src="{{ url_for('static',filename='js/main.js') }}"></script>
</body>

</html>
