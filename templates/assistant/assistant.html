{% extends "base.html" %}

{% block title %}
AI Assistant
{% endblock %}

{% block content %}

<div class="container py-5">

<h1>

🤖 CommunityHero AI Assistant

</h1>

<div
id="chatBox"
class="glass-card p-4 mb-4"
style="height:450px;overflow:auto;">

</div>

<div class="input-group">

<input
id="message"
class="form-control"
placeholder="Ask CommunityHero AI...">

<button
class="btn btn-primary"
onclick="sendMessage()">

Send

</button>

</div>

{% endblock %}

{% block extra_js %}

<script src="{{ url_for('static',filename='js/assistant.js') }}"></script>

{% endblock %}
